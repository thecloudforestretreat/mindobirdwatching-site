<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Payment Success | Mindo Bird Watching</title>

<link rel="icon" href="/favicon.ico" sizes="any" />
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<link rel="manifest" href="/site.webmanifest" />
<meta name="theme-color" content="#0b5b32" />

<link rel="stylesheet" href="/assets/css/site.css" />
<link rel="stylesheet" href="/assets/css/header.css" />
<link rel="stylesheet" href="/assets/css/footer.css" />
<script defer src="/assets/js/head.js"></script>

<style>
.page { margin-top: 18px; padding: 26px; }
.page.card{
background: var(--card);
border: 1px solid var(--line);
border-radius: var(--r);
box-shadow: var(--shadow);
}
.successShell{
background: linear-gradient(180deg, rgba(255,255,255,0.35), rgba(255,255,255,0.15));
border-radius: calc(var(--r) + 4px);
padding: 18px;
border: 1px solid rgba(255,255,255,0.35);
}
.successTop{
display:flex;
gap:14px;
align-items:flex-start;
justify-content:space-between;
flex-wrap:wrap;
margin-bottom:14px;
}
.successTitle{
margin:0 0 6px 0;
font-family:"Playfair Display", serif;
font-weight:700;
color:#0e4b2e;
font-size:44px;
line-height:1.04;
}
.successSub{
margin:0;
color:var(--muted);
}
.statusPill{
display:inline-flex;
align-items:center;
gap:10px;
padding:10px 14px;
background:rgba(255,255,255,0.85);
border:1px solid var(--line);
border-radius:999px;
font-weight:650;
}
.statusDot{
width:10px;
height:10px;
border-radius:999px;
background:#0e7a3e;
}
.successGrid{
display:grid;
grid-template-columns:1.15fr 0.85fr;
gap:16px;
}
.cardInner{
background:rgba(255,255,255,0.76);
border:1px solid var(--line);
border-radius:16px;
padding:16px;
}
.summaryTitle{
margin:0 0 10px 0;
font-family:"Playfair Display", serif;
font-weight:700;
color:#0e4b2e;
}
.summaryTable{
width:100%;
border-radius:14px;
border:1px solid var(--line);
}
.summaryRow{
display:grid;
grid-template-columns:160px 1fr;
padding:10px 12px;
border-top:1px solid rgba(0,0,0,0.06);
}
.summaryRow:first-child{border-top:0;}
.summaryVal{
text-align:right;
font-weight:650;
}
.helperText{
margin-top:10px;
font-size:13px;
color:rgba(0,0,0,0.58);
}
.actionRow{
display:grid;
grid-template-columns:repeat(2,minmax(0,1fr));
gap:12px;
margin-top:14px;
}
@media (min-width:901px){
.actionRow{grid-template-columns:repeat(3,minmax(0,1fr));}
}
.actionRow .btn{
width:100%;
justify-content:center;
}
.imageCard{
padding:0;
overflow:hidden;
position:relative;
min-height:520px;
}
.imageCard img{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
}
</style>
</head>

<body>

<div class="container">
<div id="siteHeader"></div>

<main class="page card">

<div class="successShell">

<div class="successTop">
<div>
<h1 class="successTitle">Thanks for your payment</h1>
<p class="successSub">Your tour booking has been received.</p>
</div>

<div class="statusPill">
<span class="statusDot"></span>
<span>Payment received</span>
</div>
</div>

<section class="successGrid">

<div>

<section class="cardInner">

<h2 class="summaryTitle">Booking summary</h2>

<div class="summaryTable">

<div class="summaryRow">
<div>Tour</div>
<div class="summaryVal" id="sumTour">-</div>
</div>

<div class="summaryRow">
<div>Tour date</div>
<div class="summaryVal" id="sumDate">-</div>
</div>

<div class="summaryRow">
<div>Days until tour</div>
<div class="summaryVal" id="sumDays">-</div>
</div>

<div class="summaryRow">
<div>Pickup window</div>
<div class="summaryVal" id="sumPickup">-</div>
</div>

</div>

<p class="helperText">Pickup will be at the time listed on the tour.</p>

<div class="actionRow">

<a id="receiptBtn" class="btn primary" href="#" target="_blank" rel="noopener noreferrer" style="display:none">Receipt</a>

<a class="btn primary" href="https://mindobirdwatching.com/shop/" target="_blank">Visit Gift Shop</a>

<a class="btn secondary" href="https://wa.me/13054585402" target="_blank">WhatsApp us</a>

<a class="btn secondary" href="https://mindobirdwatching.com/contact/" target="_blank">Contact</a>

<a class="btn ghost" href="https://mindobirdwatching.com/terms-conditions/" target="_blank">Terms & Conditions</a>

<a class="btn ghost" href="https://instagram.com/mindobirdwatching" target="_blank">Instagram</a>

</div>

</section>

</div>

<aside class="cardInner imageCard">
<img src="/assets/images/pages/mbw_payment_success_01.jpg" alt="Mindo cloud forest">
</aside>

</section>

</div>

</main>

<div id="siteFooter"></div>
</div>

<script src="/assets/js/includes.js"></script>
<script src="/assets/js/site.js"></script>

<script>

(function(){

function qs(name){
return new URLSearchParams(window.location.search).get(name) || "";
}

function safeText(el,val){
if(!el) return;
el.textContent = val || "-";
}

var tour = qs("tour") || qs("tour_code") || "";
var date = qs("date") || qs("tour_date") || "";
var pickup = qs("pickup") || qs("pickup_window") || "6:00 AM to 6:15 AM";

safeText(document.getElementById("sumTour"), tour);
safeText(document.getElementById("sumDate"), date);
safeText(document.getElementById("sumPickup"), pickup);

var daysEl = document.getElementById("sumDays");

try{
if(date){
var d = new Date(date + "T00:00:00");
var now = new Date();
var startToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
var diffMs = d.getTime() - startToday.getTime();
var diffDays = Math.round(diffMs / (1000*60*60*24));
safeText(daysEl,String(Math.max(diffDays,0)));
}
}catch(e){
safeText(daysEl,"1");
}

var sessionId = qs("session_id");

if(sessionId){

fetch("/stripe/api/session?session_id=" + encodeURIComponent(sessionId))
.then(function(r){return r.json();})
.then(function(data){

if(!data || !data.ok) return;

var receiptUrl = data.session && data.session.stripe_receipt_url;

if(receiptUrl){
var btn = document.getElementById("receiptBtn");
btn.href = receiptUrl;
btn.style.display = "inline-flex";
}

})
.catch(function(){});

}

})();

</script>

</body>
</html>
