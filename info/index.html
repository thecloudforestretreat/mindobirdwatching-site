<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>MBW Admin | Staff Info Library</title>
<meta content="noindex,nofollow,noarchive" name="robots"/>
<link href="/favicon.ico" rel="icon" sizes="any"/>
<link href="/favicon.svg" rel="icon" type="image/svg+xml"/>
<link href="/apple-touch-icon.png" rel="apple-touch-icon"/>
<meta content="#0f5f3a" name="theme-color"/>


<script defer="" src="/assets/js/head.js"></script>
<style>
    @import url("https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Open+Sans:wght@400;600;700;800&display=swap");

    :root{
      --bg:#C7DAAC;
      --forest:#0D5925;
      --forest-2:#114d25;
      --brown:#8B4513;
      --sky:#87CEEB;
      --gold:#FFD700;
      --ink:#071923;
      --muted:rgba(7,25,35,.72);
      --line:rgba(7,25,35,.14);
      --card:rgba(255,255,255,.72);
      --card-strong:rgba(255,255,255,.88);
      --soft:rgba(255,255,255,.54);
      --soft-2:rgba(13,89,37,.08);
      --shadow:0 18px 55px rgba(7,25,35,.10);
      --radius:18px;
      --max:1180px;
      --font:"Open Sans", system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      --font-head:"Playfair Display", Georgia, "Times New Roman", serif;
    }

    *{ box-sizing:border-box; }

    html{ min-height:100%; overflow-x:hidden; }

    body[data-page-type="staff_info"]{
      min-height:100%;
      color:var(--ink);
      font-family:var(--font);
      font-size:15px;
      line-height:1.5;
    }

    button, select{
      font:inherit;
    }

    button{
      cursor:pointer;
    }

    .staffInfoShell{
      padding-top:24px;
      padding-bottom:34px;
    }

    .app{
      width:100%;
      margin:18px 0 0;
      padding:0;
    }

    .hero{
      display:grid;
      grid-template-columns:minmax(260px, 1fr) minmax(360px, 520px) auto;
      gap:16px;
      align-items:stretch;
      padding:16px;
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:var(--card);
      backdrop-filter:blur(10px);
      box-shadow:var(--shadow);
    }

    .titleBlock{
      display:flex;
      flex-direction:column;
      justify-content:center;
      min-width:0;
    }

    h1{
      margin:0;
      color:var(--forest);
      font-family:var(--font-head);
      font-size:clamp(26px, 3vw, 38px);
      line-height:1.05;
      letter-spacing:0;
    }

    .subtitle{
      max-width:58ch;
      margin:8px 0 0;
      color:var(--muted);
      font-size:14px;
    }

    .controlGrid{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      align-content:center;
    }

    .field{
      display:grid;
      grid-template-columns:92px minmax(0, 1fr);
      align-items:center;
      min-height:42px;
      padding:6px 10px;
      border:1px solid var(--line);
      border-radius:14px;
      background:var(--card-strong);
    }

    .field label{
      color:var(--forest-2);
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
    }

    .field select,
    .field input{
      width:100%;
      min-width:0;
      border:0;
      outline:0;
      background:transparent;
      color:var(--ink);
      font-weight:800;
    }

    .heroActions{
      display:grid;
      grid-template-rows:auto auto 1fr;
      gap:14px;
      align-items:center;
      justify-items:end;
      min-width:142px;
    }

    .staffBrand{
      width:52px;
      height:52px;
      border-radius:50%;
      border:1px solid var(--line);
      background:var(--card-strong);
      box-shadow:0 8px 18px rgba(20,50,32,.12);
      object-fit:cover;
    }

    .btn{
      min-height:40px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      border:1px solid rgba(13,89,37,.35);
      border-radius:14px;
      background:rgba(13,89,37,.14);
      color:#143c28;
      padding:9px 13px;
      font-size:13px;
      font-weight:850;
      text-decoration:none;
      white-space:nowrap;
      transition:background .15s ease, transform .15s ease, border-color .15s ease;
    }

    .btn:hover{
      background:rgba(13,89,37,.20);
      border-color:rgba(13,89,37,.48);
      transform:translateY(-1px);
    }

    .btn:active{ transform:translateY(0); }

    .btn.secondary{
      background:var(--card-strong);
      border-color:var(--line);
    }

    .workspace{
      margin-top:16px;
      display:grid;
      grid-template-columns:330px minmax(0, 1fr);
      gap:16px;
      align-items:start;
    }

    .panel{
      min-width:0;
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:var(--card);
      backdrop-filter:blur(10px);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .panelHead{
      min-height:52px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:12px 14px;
      border-bottom:1px solid var(--line);
      background:rgba(255,255,255,.48);
    }

    .panelHead h2{
      margin:0;
      color:var(--forest);
      font-family:var(--font-head);
      font-size:18px;
      line-height:1.2;
      letter-spacing:0;
    }

    .count{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:34px;
      min-height:28px;
      padding:4px 9px;
      border:1px solid var(--line);
      border-radius:999px;
      background:var(--card-strong);
      font-size:12px;
      font-weight:900;
    }

    .itemList{
      display:grid;
      gap:8px;
      padding:12px;
      max-height:calc(100vh - 260px);
      overflow:auto;
    }

    .itemBtn{
      width:100%;
      min-height:74px;
      display:grid;
      grid-template-columns:minmax(0, 1fr) auto;
      gap:12px;
      align-items:start;
      padding:12px;
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:var(--card-strong);
      color:var(--ink);
      text-align:left;
      box-shadow:0 6px 18px rgba(20,50,32,.06);
    }

    .itemBtn[aria-current="true"]{
      border-color:#7ea989;
      background:rgba(13,89,37,.10);
    }

    .itemTitle{
      font-size:13px;
      font-weight:900;
      line-height:1.25;
      overflow-wrap:anywhere;
    }

    .itemMeta{
      margin-top:5px;
      color:var(--muted);
      font-size:12px;
      line-height:1.3;
    }

    .price{
      min-width:138px;
      max-width:none;
      padding:5px 8px;
      border:1px solid var(--line);
      border-radius:999px;
      background:rgba(255,255,255,.48);
      font-size:11.5px;
      font-weight:900;
      text-align:center;
      white-space:nowrap;
      line-height:1.2;
    }

    .detailPane{
      padding:14px;
    }

    .detailTop{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
    }

    .detailTitle{
      margin:0;
      color:var(--forest);
      font-family:var(--font-head);
      font-size:22px;
      line-height:1.2;
      letter-spacing:0;
    }

    .updated{
      color:var(--muted);
      font-size:12px;
      white-space:nowrap;
      padding-top:4px;
    }

    .blocks{
      display:grid;
      gap:10px;
    }

    .infoBlock{
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:var(--card-strong);
      overflow:hidden;
    }

    .infoHead{
      min-height:45px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:9px 10px 9px 12px;
      border-bottom:1px solid var(--line);
      background:rgba(255,255,255,.48);
    }

    .infoHead strong{
      color:var(--forest-2);
      font-size:12px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:0;
    }

    .infoBody{
      padding:12px;
      color:var(--ink);
      line-height:1.65;
      white-space:pre-wrap;
      overflow-wrap:anywhere;
    }

    .mediaRow{
      display:grid;
      grid-template-columns:74px minmax(0, 1fr);
      gap:12px;
      align-items:center;
    }

    .thumb{
      width:74px;
      height:74px;
      border:1px solid var(--line);
      border-radius:var(--radius);
      overflow:hidden;
      background:rgba(255,255,255,.48);
    }

    .thumb img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .empty{
      margin:0;
      color:var(--muted);
    }

    .socialPanel{
      margin-top:16px;
    }

    .socialGrid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:10px;
      padding:12px;
    }

    .socialCard{
      min-height:66px;
      display:grid;
      grid-template-columns:36px minmax(0, 1fr) auto;
      gap:10px;
      align-items:center;
      padding:12px;
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:var(--card-strong);
    }

    .socialIcon{
      width:34px;
      height:34px;
      border-radius:var(--radius);
      border:1px solid var(--line);
      background-color:var(--soft);
      background-position:center;
      background-repeat:no-repeat;
      background-size:22px 22px;
    }

    .socialName{
      min-width:0;
      font-size:13px;
      font-weight:900;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .socialUrl{
      margin-top:2px;
      color:var(--muted);
      font-size:11px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      display:none;
      max-width:calc(100vw - 24px);
      padding:10px 12px;
      border:1px solid rgba(13,89,37,.35);
      border-radius:var(--radius);
      background:var(--card-strong);
      color:#143c28;
      box-shadow:var(--shadow);
      font-size:13px;
      font-weight:900;
      text-align:center;
      z-index:50;
    }

    @media (max-width:980px){
      .hero{
        grid-template-columns:1fr;
      }

      .heroActions{
        grid-template-columns:1fr auto;
        grid-template-rows:auto;
        justify-items:start;
      }

      .workspace{
        grid-template-columns:1fr;
      }

      .itemList{
        max-height:none;
      }

      .socialGrid{
        grid-template-columns:repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width:640px){
      .staffInfoShell{
        padding-top:18px;
        padding-bottom:24px;
      }

      .app{
        width:100%;
        padding:0;
      }

      .hero,
      .workspace{
        gap:10px;
      }

      .hero{
        padding:12px;
      }

      .field{
        grid-template-columns:1fr;
        gap:2px;
      }

      .heroActions{
        grid-template-columns:1fr;
        justify-items:stretch;
      }

      .staffBrand{
        justify-self:end;
      }

      .btn{
        width:100%;
      }

      .detailTop{
        display:grid;
      }

      .updated{
        white-space:normal;
      }

      .socialGrid{
        grid-template-columns:1fr;
      }

      .socialCard{
        grid-template-columns:36px minmax(0, 1fr) 76px;
      }
    }
  </style>

<body data-page-content-group="staff" data-page-language="en" data-page-type="staff_info">
<div class="container staffInfoShell">
<div data-current-lang="en" id="siteHeader"></div>
<main aria-label="Staff info" class="app">
<header class="hero">
<div class="titleBlock">
<h1 id="pageTitle">Staff Info Library</h1>
<p class="subtitle" id="pageNote">Internal staff reference for calls, WhatsApp replies, pricing, links, and quick answers. This page is intentionally noindexed.</p>
</div>
<section aria-label="Filters" class="controlGrid">
<div class="field">
<label for="langSel" id="langLbl">Language</label>
<select id="langSel">
<option value="en">English</option>
<option value="es">Español</option>
</select>
</div>
<div class="field">
<label for="subjSel" id="subjLbl">Subject</label>
<select id="subjSel"></select>
</div>
<div class="field">
<label for="topicSel" id="topicLbl">Topic</label>
<select id="topicSel"></select>
</div>
<div class="field">
<label for="searchInput" id="searchLbl">Search</label>
<input id="searchInput" type="search" placeholder="Tour, price, pickup, review..." />
</div>
</section>
<aside aria-label="Quick actions" class="heroActions">
<img alt="Mindo Bird Watching" class="staffBrand" decoding="async" loading="lazy" src="/apple-touch-icon.png"/>
<a class="btn secondary" href="/">Admin</a>
<button class="btn" id="copyBookBtn" type="button">Copy booking link</button>
</aside>
</header>
<section aria-label="Content" class="workspace">
<section aria-label="Items" class="panel">
<div class="panelHead">
<h2 id="listTitle">Items</h2>
<span class="count" id="countBadge">0</span>
</div>
<div class="itemList" id="itemList"></div>
</section>
<section aria-label="Details" class="panel">
<div class="panelHead">
<h2 id="detailHead">Details</h2>
</div>
<div class="detailPane" id="detailPane">
<p class="empty" id="emptyState">Select an item to see details.</p>
</div>
</section>
</section>
<section aria-label="Social links" class="panel socialPanel">
<div class="panelHead">
<h2 id="socialTitle">Social links</h2>
</div>
<div class="socialGrid" id="socialGrid"></div>
</section>
</main>
<div id="siteFooter"></div>
</div>

<script>
    (function(){
      "use strict";

      const BASE = "https://mindobirdwatching.com";
      const DATA_URL = "https://script.google.com/macros/s/AKfycbzPORSX9WyGwLkBs3BIrkSmdHSPpmPTSQg1CtpGw-8Ak2q9vBEbx8qQ9UdRBCSyrDg/exec";
      const FALLBACK_DATA_URL = "/assets/data/staff-content.json";

      const I18N = {
        en: {
          pageTitle: "Staff Info Library",
          pageNote: "A live staff reference for calls, WhatsApp replies, pricing, links, and quick answers.",
          lang: "Language",

          copied: "Copied",
          noData: "Unable to load staff content."
        },
        es: {
          pageTitle: "Biblioteca del equipo",
          pageNote: "Referencia interna en vivo para llamadas, WhatsApp, precios, enlaces y respuestas rapidas.",
          lang: "Idioma",
          subject: "Asunto",
          topic: "Tema",
          search: "Buscar",
          searchPlaceholder: "Tour, precio, recogida, reseña...",
          items: "Items",
          details: "Detalle",
          empty: "Selecciona un item para ver el detalle.",
          copy: "Copiar",
          copyShort: "Copiar corto",
          copyLong: "Copiar largo",
          copyCost: "Copiar costo",
          copyUrl: "Copiar URL",
          short: "Mensaje corto",
          long: "Mensaje largo",
          cost: "Costo",
          source: "Fuente",
          image: "Imagen",
          whatsapp: "Listo para WhatsApp",
          bot: "Respuesta del bot",
          notes: "Notas internas",
          updated: "Actualizado",
          bookBtn: "Copiar link para reservar",
          bookUrl: BASE + "/es/reservar-tour/",
          social: "Redes",
          copied: "Copiado",
          noData: "No se pudo cargar el contenido."
        }
      };

      const socialFallback = [
        { title: "Instagram", url: "https://instagram.com/mindobirdwatching", icon: "/assets/images/icons/MBW-IG.png" },
        { title: "TikTok", url: "https://www.tiktok.com/@mindobirdwatching", icon: "/assets/images/icons/MBW-Social-TikTok.png" },

        { title: "Google Reviews", url: "https://g.page/r/CdMlIYMGgBIvEAE/review", icon: "/assets/images/icons/Google-Review-Symbol.png" },
        { title: "Gift Shop", url: "https://shop.mindobirdwatching.com/", icon: "/assets/images/icons/MBW-Social-Shopify.png" }
      ];

      const els = {
        langSel: document.getElementById("langSel"),
        subjSel: document.getElementById("subjSel"),
        topicSel: document.getElementById("topicSel"),
        searchInput: document.getElementById("searchInput"),
        itemList: document.getElementById("itemList"),
        detailPane: document.getElementById("detailPane"),
        countBadge: document.getElementById("countBadge"),
        toast: document.getElementById("toast"),
        copyBookBtn: document.getElementById("copyBookBtn"),
        pageTitle: document.getElementById("pageTitle"),
        pageNote: document.getElementById("pageNote"),
        langLbl: document.getElementById("langLbl"),
        subjLbl: document.getElementById("subjLbl"),
        topicLbl: document.getElementById("topicLbl"),
        searchLbl: document.getElementById("searchLbl"),
        listTitle: document.getElementById("listTitle"),
        detailHead: document.getElementById("detailHead"),
        socialTitle: document.getElementById("socialTitle"),
        socialGrid: document.getElementById("socialGrid")
      };

      let DATA = { languages: {} };
      let state = {
        lang: "en",
        subject: "Tours",
        topic: "Birdwatching",
        query: "",
        activeId: ""
      };

      function esc(value){
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function currentText(){
        return I18N[state.lang] || I18N.en;
      }

      function normalizeApiData(payload){
        if(payload && payload.languages) return payload;

        const grouped = {};
        const rows = Array.isArray(payload && payload.items) ? payload.items : [];

        rows.forEach(row => {
          if(String(row.is_active || "").toLowerCase() === "no") return;

          const lang = row.language || "en";
          const subject = row.subject || "General";

          if(!grouped[lang]) grouped[lang] = {};
          if(!grouped[lang][subject]) grouped[lang][subject] = [];

          grouped[lang][subject].push({
            id: row.content_id || row.original_id || "",
            content_id: row.content_id || "",
            original_id: row.original_id || "",
            subject,
            topic: row.topic || "General",
            subtopic: row.subtopic || "",
            title: row.title || "",
            cost: row.cost || "",
            message_short: row.message_short || "",
            message_long: row.message_long || "",
            whatsapp_ready: row.whatsapp_ready || "",
            bot_response: row.bot_response || "",
            staff_notes: row.staff_notes || "",
            image_url: row.image_full_url || row.image_url || "",
            source_url: row.source_full_url || row.source_url || "",
            tags: row.tags || "",
            search_keywords: row.search_keywords || "",
            youtube_url: row.youtube_url || "",
            instagram_url: row.instagram_url || "",
            social_url: row.social_url || "",
            sort_order: Number(row.sort_order || 0),
            priority: Number(row.priority || 0),
            last_updated: row.last_updated || ""
          });
        });

        Object.keys(grouped).forEach(lang => {
          Object.keys(grouped[lang]).forEach(subject => {
            grouped[lang][subject].sort((a, b) => {
              const priority = (b.priority || 0) - (a.priority || 0);
              if(priority) return priority;
              const sort = (a.sort_order || 0) - (b.sort_order || 0);
              if(sort) return sort;
              return String(a.title || "").localeCompare(String(b.title || ""));
            });
          });
        });

        return { languages: grouped };
      }

      function subjectsForLang(lang){
        const langData = DATA.languages && DATA.languages[lang] ? DATA.languages[lang] : {};
        return Object.keys(langData)
          .filter(subject => subject.toLowerCase() !== "social")
          .sort((a, b) => {
            const preferred = ["Tours", "Activities", "Questions", "Transportation"];
            const ai = preferred.indexOf(a);
            const bi = preferred.indexOf(b);
            if(ai !== -1 || bi !== -1) return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
            return a.localeCompare(b);
          });
      }

      function itemsFor(lang, subject){
        const langData = DATA.languages && DATA.languages[lang] ? DATA.languages[lang] : {};
        return langData[subject] || [];
      }

      function topicsFrom(items){
        return Array.from(new Set(items.map(item => String(item.topic || "General").trim()).filter(Boolean))).sort();
      }

      function filterByTopic(items, topic){
        let filtered = topic ? items.filter(item => String(item.topic || "") === topic) : items;
        const query = String(state.query || "").trim().toLowerCase();
        if(!query) return filtered;
        return filtered.filter(item => [
          item.title,
          item.cost,
          item.message_short,
          item.message_long,
          item.whatsapp_ready,
          item.bot_response,
          item.staff_notes,
          item.source_url,
          item.tags,
          item.search_keywords,
          item.subtopic,
          item.topic
        ].join(" ").toLowerCase().includes(query));
      }

      function setOptions(select, values, selected){
        select.innerHTML = values.map(value => `<option value="${esc(value)}">${esc(value)}</option>`).join("");
        if(values.includes(selected)) select.value = selected;
        else select.value = values[0] || "";
      }

      function showToast(message){
        els.toast.textContent = message;
        els.toast.style.display = "block";
        clearTimeout(window.__mbwToast);
        window.__mbwToast = setTimeout(() => {
          els.toast.style.display = "none";
        }, 1400);
      }

      async function copyText(text){
        const value = String(text || "").trim();
        if(!value) return;

        try{
          if(navigator.clipboard && navigator.clipboard.writeText){
            await navigator.clipboard.writeText(value);
            showToast(currentText().copied);
            return;
          }
        }catch(error){}

        const textarea = document.createElement("textarea");
        textarea.value = value;
        textarea.setAttribute("readonly", "readonly");
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        document.body.removeChild(textarea);
        showToast(currentText().copied);
      }

      function setStaticText(){
        const text = currentText();
        document.documentElement.lang = state.lang;
        els.pageTitle.textContent = text.pageTitle;
        els.pageNote.textContent = text.pageNote;
        els.langLbl.textContent = text.lang;
        els.subjLbl.textContent = text.subject;
        els.topicLbl.textContent = text.topic;
        els.searchLbl.textContent = text.search;
        els.searchInput.placeholder = text.searchPlaceholder;
        els.listTitle.textContent = text.items;
        els.detailHead.textContent = text.details;
        els.socialTitle.textContent = text.social;
        els.copyBookBtn.textContent = text.bookBtn;
      }

      function block(label, body, copyLabel){
        if(!String(body || "").trim()) return "";
        return `
          <section class="infoBlock">
            <div class="infoHead">
              <strong>${esc(label)}</strong>
              <button class="btn secondary" type="button" data-copy="${esc(body)}">${esc(copyLabel || currentText().copy)}</button>
            </div>
            <div class="infoBody">${esc(body)}</div>
          </section>
        `;
      }

      function renderDetail(item, skipScroll){
        const text = currentText();

        if(!item){
          els.detailPane.innerHTML = `<p class="empty">${esc(text.empty)}</p>`;
          return;
        }

        const title = item.title || item.subtopic || item.topic || "Item";
        const shortText = String(item.message_short || title).trim();
        const longText = String(item.message_long || "").trim();
        const cost = String(item.cost || "").trim();
        const sourceUrl = String(item.source_url || "").trim();
        const imageUrl = String(item.image_url || "").trim();
        const whatsappReady = String(item.whatsapp_ready || "").trim();
        const botResponse = String(item.bot_response || "").trim();
        const staffNotes = String(item.staff_notes || "").trim();

        const imageBlock = imageUrl ? `
          <section class="infoBlock">
            <div class="infoHead">
              <strong>${esc(text.image)}</strong>
              <button class="btn secondary" type="button" data-copy="${esc(imageUrl)}">${esc(text.copyUrl)}</button>
            </div>
            <div class="infoBody">
              <div class="mediaRow">
                <div class="thumb"><img src="${esc(imageUrl)}" alt="" loading="lazy" decoding="async"></div>
                <span>${esc(imageUrl)}</span>
              </div>
            </div>
          </section>
        ` : "";

        els.detailPane.innerHTML = `
          <div class="detailTop">
            <h3 class="detailTitle">${esc(title)}</h3>
            ${item.last_updated ? `<div class="updated">${esc(text.updated)}: ${esc(item.last_updated)}</div>` : ""}
          </div>
          <div class="blocks">
            ${block(text.short, shortText, text.copyShort)}
            ${block(text.whatsapp, whatsappReady, text.copy)}
            ${block(text.bot, botResponse, text.copy)}
            ${block(text.long, longText, text.copyLong)}
            ${block(text.cost, cost, text.copyCost)}
            ${block(text.source, sourceUrl, text.copyUrl)}
            ${imageBlock}
            ${block(text.notes, staffNotes, text.copy)}
          </div>
        `;

        Array.from(els.detailPane.querySelectorAll("[data-copy]")).forEach(button => {
          button.addEventListener("click", () => copyText(button.getAttribute("data-copy")));
        });

        if(!skipScroll && window.matchMedia("(max-width: 980px)").matches){
          els.detailPane.scrollIntoView({ behavior:"smooth", block:"start" });
        }
      }

      function renderList(){
        const items = filterByTopic(itemsFor(state.lang, state.subject), state.topic);
        els.countBadge.textContent = String(items.length);

        if(!items.length){
          state.activeId = "";
          els.itemList.innerHTML = "";
          renderDetail(null);
          return;
        }

        els.itemList.innerHTML = items.map(item => {
          const title = item.title || item.subtopic || item.topic || "Item";
          const meta = [item.subtopic, item.topic].filter(Boolean).join(" - ");
          const selected = String(item.id) === String(state.activeId);

          return `
            <button class="itemBtn" type="button" data-id="${esc(item.id)}" aria-current="${selected ? "true" : "false"}">
              <div>
                <div class="itemTitle">${esc(title)}</div>
                <div class="itemMeta">${esc(meta)}</div>
              </div>
              ${item.cost ? `<div class="price">${esc(item.cost)}</div>` : `<div></div>`}
            </button>
          `;
        }).join("");

        Array.from(els.itemList.querySelectorAll("[data-id]")).forEach(button => {
          button.addEventListener("click", () => {
            state.activeId = button.getAttribute("data-id");
            renderList();
          });
        });

        const active = items.find(item => String(item.id) === String(state.activeId)) || items[0];
        state.activeId = active.id;
        renderDetail(active, true);
      }

      function socialIconFor(title){
        const lower = String(title || "").toLowerCase();
        const found = socialFallback.find(row => lower.includes(String(row.title || "").toLowerCase().split(" ")[0]));
        return found ? found.icon : "";
      }

      function renderSocial(){
        const socialRows = itemsFor(state.lang, "Social")
          .map(item => {
            const title = item.title || item.topic || "Social";
            return {
              title,
              url: String(item.source_url || item.message_short || item.message_long || "").trim(),
              icon: item.image_url || socialIconFor(title)
            };
          })
          .filter(item => item.url);

        const rows = socialRows.length ? socialRows : socialFallback;

        els.socialGrid.innerHTML = rows.map(row => `
          <article class="socialCard">
            <span class="socialIcon" style="background-image:url('${esc(row.icon)}')" aria-hidden="true"></span>
            <div>
              <div class="socialName">${esc(row.title)}</div>
              <div class="socialUrl">${esc(row.url)}</div>
            </div>
            <button class="btn secondary" type="button" data-copy="${esc(row.url)}">${esc(currentText().copy)}</button>
          </article>
        `).join("");

        Array.from(els.socialGrid.querySelectorAll("[data-copy]")).forEach(button => {
          button.addEventListener("click", () => copyText(button.getAttribute("data-copy")));
        });
      }

      function refreshSelectors(){
        setStaticText();

        const subjects = subjectsForLang(state.lang);

        if(!subjects.length){
          els.subjSel.innerHTML = "";
          els.topicSel.innerHTML = "";
          els.itemList.innerHTML = "";
          els.countBadge.textContent = "0";
          els.detailPane.innerHTML = `<p class="empty">${esc(currentText().noData)}</p>`;
          renderSocial();
          return;
        }

        if(!subjects.includes(state.subject)) state.subject = subjects.includes("Tours") ? "Tours" : subjects[0];
        setOptions(els.subjSel, subjects, state.subject);

        const topics = topicsFrom(itemsFor(state.lang, state.subject));
        if(!topics.includes(state.topic)) state.topic = topics.includes("Birdwatching") ? "Birdwatching" : topics[0] || "";
        setOptions(els.topicSel, topics.length ? topics : [""], state.topic);

        renderList();
        renderSocial();
      }

      async function fetchJson(url){
        const response = await fetch(url, { cache:"no-store" });
        if(!response.ok) throw new Error("Unable to load " + url);
        return response.json();
      }

      async function loadData(){
        try{
          const payload = await fetchJson(DATA_URL);
          DATA = normalizeApiData(payload);
        }catch(error){
          try{
            DATA = normalizeApiData(await fetchJson(FALLBACK_DATA_URL));
          }catch(fallbackError){
            DATA = { languages:{} };
          }
        }

        refreshSelectors();
      }

      els.langSel.addEventListener("change", () => {
        state.lang = els.langSel.value === "es" ? "es" : "en";
        state.subject = state.lang === "en" ? "Tours" : "Tours";
        state.topic = "Birdwatching";
        state.query = "";
        els.searchInput.value = "";
        state.activeId = "";
        refreshSelectors();
      });

      els.subjSel.addEventListener("change", () => {
        state.subject = els.subjSel.value || "";
        state.topic = state.subject === "Tours" ? "Birdwatching" : "";
        state.activeId = "";
        refreshSelectors();
      });

      els.topicSel.addEventListener("change", () => {
        state.topic = els.topicSel.value || "";
        state.activeId = "";
        renderList();
      });

      els.searchInput.addEventListener("input", () => {
        state.query = els.searchInput.value || "";
        state.activeId = "";
        renderList();
      });

      els.copyBookBtn.addEventListener("click", () => copyText(currentText().bookUrl));

      els.langSel.value = "en";
      setStaticText();
      loadData();
    })();
  </script>
<script defer="" src="/assets/js/includes.js"></script>
</body>
</html>
